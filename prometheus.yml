global:
    scrape_interval: 15s
    evaluation_interval: 15s

scrape_configs:
    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]

    - job_name: "app"
      static_configs:
          - targets: ["app:3000"]
      metrics_path: "/metrics"

    - job_name: "cadvisor"
      static_configs:
          - targets: ["cadvisor:8080"]
      scrape_interval: 5s
      metrics_path: "/metrics"

    - job_name: "mongodb"
      static_configs:
          - targets: ["mongodb-exporter:9216"]
      scrape_interval: 10s
